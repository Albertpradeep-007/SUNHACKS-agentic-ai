services:
  - type: web
    name: peip-backend
    runtime: docker
    plan: free
    rootDir: .
    dockerfilePath: backend/Dockerfile
    autoDeploy: true
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: GROQ_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: DATABASE_URL
        value: sqlite:///./data/peip.db
      - key: CLONE_DIR
        value: ./data/cloned_repos
      - key: REPORT_OUTPUT_DIR
        value: ./data/reports
      - key: CORS_ORIGINS
        value: https://peip-frontend.onrender.com

  - type: static
    name: peip-frontend
    rootDir: .
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_BASE
        value: https://peip-backend.onrender.com
